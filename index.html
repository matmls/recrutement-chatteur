<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recrutement Chatteur</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap');
  :root{
    --bg:#0D0B14; --surface:#17141F; --surface-2:#1E1A2A; --border:#2C2739;
    --text:#EDEAF5; --muted:#8B85A0; --accent:#E0468B; --accent-2:#7C5CFC; --ok:#4ADE80; --warn:#F5A623; --err:#F56060;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:
      radial-gradient(circle at 15% -10%, rgba(124,92,252,0.18), transparent 45%),
      radial-gradient(circle at 100% 10%, rgba(224,70,139,0.14), transparent 40%), var(--bg);
    color:var(--text); font-family:'Inter', sans-serif; min-height:100vh; display:flex; justify-content:center; padding:32px 16px 64px;}
  .wrap{width:100%; max-width:640px;}
  .topbar{display:flex; align-items:center; gap:14px; margin-bottom:28px;}
  .step-count{font-family:'JetBrains Mono', monospace; font-size:13px; color:var(--accent); white-space:nowrap;}
  .bar{flex:1; height:3px; background:var(--border); border-radius:99px; overflow:hidden;}
  .bar-fill{height:100%; width:0%; background:linear-gradient(90deg, var(--accent-2), var(--accent)); transition:width .4s ease;}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:32px 28px; box-shadow:0 20px 60px rgba(0,0,0,0.35);}
  .eyebrow{font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin:0 0 10px;}
  h1{font-family:'Space Grotesk', sans-serif; font-size:26px; line-height:1.25; margin:0 0 6px;}
  h2{font-family:'Space Grotesk', sans-serif; font-size:19px; line-height:1.3; margin:0 0 16px;}
  p.sub{color:var(--muted); font-size:14.5px; line-height:1.55; margin:0 0 4px;}
  .brief{margin-top:22px; display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .brief .item{background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:12px 14px;}
  .brief .item .k{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px;}
  .brief .item .v{font-size:14px; font-weight:600;}
  .conditions{margin-top:18px; padding-left:0; list-style:none;}
  .conditions li{font-size:14px; color:var(--text); padding:8px 0 8px 26px; position:relative; border-top:1px solid var(--border);}
  .conditions li:first-child{border-top:none;}
  .conditions li::before{content:"✓"; position:absolute; left:0; top:8px; color:var(--ok); font-weight:700; font-size:13px;}
  .pwd-hint{margin-top:16px; font-size:13px; color:var(--muted); font-style:italic;}
  .warn-banner{background:rgba(245,166,35,0.1); border:1px solid rgba(245,166,35,0.35); color:var(--warn);
    border-radius:12px; padding:12px 14px; font-size:13.5px; margin-bottom:18px; display:flex; gap:10px; align-items:flex-start;}
  textarea, input[type=text]{width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:12px;
    color:var(--text); font-family:'Inter', sans-serif; font-size:15px; padding:14px 16px; resize:vertical; outline:none;
    transition:border-color .2s, box-shadow .2s;}
  textarea{min-height:120px;}
  textarea:focus, input:focus{border-color:var(--accent-2); box-shadow:0 0 0 3px rgba(124,92,252,0.18);}
  input.error, textarea.error{border-color:var(--err); box-shadow:0 0 0 3px rgba(245,96,96,0.15);}
  ::placeholder{color:#5C5670;}
  .choice-group{display:flex; flex-direction:column; gap:10px; margin-top:4px;}
  .choice{display:flex; align-items:center; gap:12px; background:var(--surface-2); border:1px solid var(--border);
    border-radius:12px; padding:13px 16px; cursor:pointer; font-size:15px; transition:border-color .2s, background .2s;}
  .choice:hover{border-color:var(--accent-2);}
  .choice .letter{width:22px; height:22px; border-radius:6px; background:var(--surface); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; font-size:11.5px; font-weight:700; color:var(--muted); flex-shrink:0;}
  .choice.selected{border-color:var(--accent); background:rgba(224,70,139,0.08);}
  .choice.selected .letter{background:var(--accent); color:white; border-color:var(--accent);}
  .check-list{display:flex; flex-direction:column; gap:12px; margin-top:6px;}
  .check-row{display:flex; align-items:flex-start; gap:12px; font-size:14.5px; line-height:1.4; cursor:pointer;}
  .check-row input{margin-top:3px; accent-color:var(--accent); width:16px; height:16px; flex-shrink:0;}
  .scale-row{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px;}
  .scale-btn{width:38px; height:38px; border-radius:10px; background:var(--surface-2); border:1px solid var(--border);
    color:var(--text); font-family:'JetBrains Mono', monospace; font-size:14px; cursor:pointer; transition:.15s;}
  .scale-btn.selected{background:var(--accent); border-color:var(--accent); color:white;}
  .file-drop{border:1.5px dashed var(--border); border-radius:12px; padding:26px 16px; text-align:center; color:var(--muted);
    font-size:13.5px; cursor:pointer; transition:border-color .2s;}
  .file-drop:hover{border-color:var(--accent-2);}
  .file-drop .fname{color:var(--ok); font-size:13px; margin-top:6px;}
  a.task-link{color:var(--accent); text-decoration:underline; word-break:break-all;}
  .nav{display:flex; justify-content:space-between; align-items:center; margin-top:26px;}
  .err-msg{color:var(--err); font-size:12.5px; margin-top:8px; display:none;}
  button{font-family:'Inter', sans-serif; font-weight:600; font-size:14.5px; border:none; border-radius:11px; padding:12px 22px;
    cursor:pointer; transition:transform .15s, opacity .15s;}
  button:active{transform:scale(0.97);}
  .btn-primary{background:linear-gradient(135deg, var(--accent-2), var(--accent)); color:white;}
  .btn-ghost{background:transparent; color:var(--muted);}
  .btn-ghost:hover{color:var(--text);}
  .btn-secondary{background:var(--surface-2); border:1px solid var(--border); color:var(--text);}
  .hint{font-size:12.5px; color:var(--muted); margin-top:8px;}
  .final{text-align:center; padding:52px 24px;}
  .final .badge{width:56px; height:56px; border-radius:50%; background:rgba(74,222,128,0.12); color:var(--ok);
    display:flex; align-items:center; justify-content:center; font-size:26px; margin:0 auto 18px;}
  .final h2{margin-bottom:8px;}
  .final p{color:var(--muted); font-size:14.5px; margin-bottom:26px;}
  .final-actions{display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}
  textarea.summary{min-height:260px; font-family:'JetBrains Mono', monospace; font-size:12px; text-align:left;}
  @media (max-width:480px){.card{padding:24px 18px;} h1{font-size:22px;} .brief{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="step-count" id="stepCount">00 / 40</span>
    <div class="bar"><div class="bar-fill" id="barFill"></div></div>
  </div>
  <div class="card" id="card"></div>
</div>

<script>
const FORM_ENDPOINT = "https://formspree.io/f/mzdnajzn";
// --- Telegram (optionnel) : remplis ces deux valeurs si tu veux aussi recevoir chaque candidature sur Telegram ---
const TELEGRAM_BOT_TOKEN = "8848909896:AAHwU_gylPiXi6ZcbYmsRD4emqREq6GMc20";
const TELEGRAM_CHAT_ID = "1182617911";
const PASSWORD_ANSWER = "pomme";
const LETTERS = ["A","B","C","D","E","F"];

const questions = [
  {type:"intro"},
  {id:"q1", type:"text", label:"Prénom et Nom", placeholder:"Jean Dupont", required:true},
  {id:"q2", type:"text", label:"Email", placeholder:"email@exemple.com", required:true},
  {id:"q3", type:"text", label:"Pseudo Discord", required:true},
  {id:"q4", type:"text", label:"Pays de résidence", required:true},
  {id:"q5", type:"text", label:"Fuseau horaire", placeholder:"GMT+1", required:true},
  {id:"q6", type:"choice", label:"Comment as-tu trouvé cette offre ?", options:["Telegram","Groupe Facebook","Discord","Autre"], required:true},
  {id:"q7", type:"choice", label:"Tu cherches", options:["Temps plein","Temps partiel"], required:true},
  {id:"q8", type:"choice", label:"Heures par jour", options:["Moins de 2h","2-4h","4-6h","6h+"], required:true},
  {id:"q9", type:"choice", label:"Jours par semaine", options:["1-2","3-4","5","6","7"], required:true},
  {id:"q10", type:"multi", label:"Créneaux disponibles dans ton fuseau", options:["Matin","Après-midi","Soir","Nuit"], required:true},
  {id:"q11", type:"text", label:"Date de disponibilité pour commencer", required:true},
  {id:"q12", type:"choice", label:"As-tu d'autres emplois en parallèle ?", options:["Oui","Non"], required:true},
  {id:"q13", type:"text", label:"Prétention de rémunération en % sur les ventes", required:true},
  {id:"q14", type:"choice", label:"Combien de temps comptes-tu rester sur ce poste ?", optional:true, options:["Quelques mois","6-12 mois","1 an+","Long terme"]},
  {id:"q15", type:"multi", label:"Appareil principal", options:["PC Windows","Mac","Android","iPhone","Tablette"], required:true},
  {id:"q16", type:"choice", label:"Type de connexion internet", options:["Fibre","ADSL/câble","4G/5G","Wi-Fi partagé"], required:true},
  {id:"q17", type:"file", label:"Faites le test de connexion sur speedtest.net", linkText:"https://www.speedtest.net/", linkHref:"https://www.speedtest.net/", note:"Envoyez une capture d'écran du résultat avec la date du jour visible", required:true},
  {id:"q18", type:"file", label:"Effectuez le test de vitesse de frappe sur 10fastfingers.com", linkText:"https://10fastfingers.com/typing-test/french", linkHref:"https://10fastfingers.com/typing-test/french", note:"Envoyez une capture d'écran du résultat avec la date du jour visible", required:true},
  {id:"q19", type:"scale", label:"Stabilité de ta connexion et de ton électricité", required:true},
  {id:"q20", type:"choice", label:"As-tu une solution de secours en cas de coupure ?", options:["Oui","Non"], required:true},
  {id:"q21", type:"scale", label:"À l'aise pour installer des applications et suivre des procédures pas à pas", required:true},
  {id:"q22", type:"multi", label:"Outils déjà utilisés", optional:true, options:["Google Drive","Telegram","Notion/Trello","Onlymonster","Gestionnaire de mots de passe","Aucun"]},
  {id:"q23", type:"choice", label:"Combien de conversation peux-tu tenir en même temps ?", options:["0-5","5-10","+10"], required:true},
  {id:"q24", type:"choice", label:"Es-tu capable de suivre un script prédéfini ?", options:["Oui","Non"], required:true},
  {type:"warning"},
  {id:"q25", type:"textarea", label:"Un abonné te dit « ta vidéo c'est un peu trop cher pour moi... je suis pas sûr de vouloir l'acheter ». Comment réponds-tu à ça ?", required:true},
  {id:"q26", type:"textarea", label:"Un abonné te demande un média ou contenu que la modèle ne peut pas fournir, comment réagis-tu ?", required:true},
  {id:"q27", type:"textarea", label:"Sais-tu comment reconnaitre un gros spender ou une baleine ? Comment ferais-tu pour garder l'intérêt de ce fan sur le moyen/long terme ?", required:true},
  {id:"q28", type:"textarea", label:"Un fan a acheté le premier média du script que tu as envoyé et cela fait maintenant 5 minutes qu'il ne te répond pas, que fais-tu ?", required:true},
  {id:"q29", type:"textarea", label:"Connais-tu le terme KYC ? Si oui, explique avec tes mots ce que ça représente pour toi et quelle est son importance pour un chatteur.", required:true},
  {id:"q30", type:"textarea", label:"Connais-tu le terme GFE ? Si oui, explique avec tes mots ce que ça représente pour toi et quelle est son importance pour un chatteur.", required:true},
  {id:"q31", type:"text", label:"Mot de passe ?", hint:"Un mot est caché dans le brief du poste.", required:true},
  {id:"q32", type:"text", label:"Langue maternelle", required:true},
  {id:"q33", type:"choice", label:"Niveau de français à l'écrit", options:["Débutant","Intermédiaire","Avancé","Bilingue/Natif"], required:true},
  {id:"q34", type:"textarea", label:"Présente-toi en 4-5 phrases", required:true},
  {id:"q35", type:"choice", label:"As-tu déjà chatté pour une agence ?", options:["Oui","Non"], required:true},
  {id:"q36", type:"choice", label:"As-tu 18 ans ou plus ?", options:["Oui","Non"], required:true},
  {id:"q37", type:"textarea", label:"Pourquoi ce poste t'intéresse ?", required:true},
  {id:"q38", type:"text", label:"Qu'est-ce qui fait de toi un·e bon·ne Chatteur ?", required:true},
  {id:"q39", type:"textarea", label:"Des questions pour nous ?", optional:true},
  {id:"q40", type:"choice", label:"Acceptes-tu un court test pratique si présélectionné·e ?", options:["Oui","Non"], required:true},
  {type:"final"}
];

const answers = {};
const files = {};
let current = 0;

function render(){
  const q = questions[current];
  const card = document.getElementById("card");
  const total = questions.length - 1;
  document.getElementById("stepCount").textContent = String(current).padStart(2,"0") + " / " + String(total).padStart(2,"0");
  document.getElementById("barFill").style.width = (current/total)*100 + "%";

  if(q.type === "intro"){
    card.innerHTML = `
      <h1>Recrutement Chatteur</h1>
      <p class="sub">Nous recherchons des chatteurs pour rejoindre notre agence</p>
      <div class="brief">
        <div class="item"><div class="k">Job</div><div class="v">💻 Chatteur</div></div>
        <div class="item"><div class="k">Rémunération</div><div class="v">💰 15% sur les ventes + Bonus</div></div>
        <div class="item"><div class="k">Salaire</div><div class="v">💵 Toutes les 2 sem., crypto (USDC BEP-20/ERC-20)</div></div>
        <div class="item"><div class="k">Shift ⏰</div><div class="v">20h-2h / 2h-8h / 8h-14h / 14h-20h, 6h, 7j/7</div></div>
      </div>
      <ul class="conditions">
        <li>Maîtrise de la langue française (oral et écrit)</li>
        <li>Expérience préalable en chatting</li>
        <li>Vitesse de frappe au clavier rapide</li>
        <li>À l'aise avec l'utilisation d'un ordinateur</li>
        <li>Ponctuel(le) et sérieux(se)</li>
      </ul>
      <p class="sub" style="margin-top:16px;"><u>Informations sur le poste :</u><br>
      Vous travaillerez avec des modèles qui génèrent plus de 500$ par shift. Vous bénéficierez de 3 jours de formation avec le manager et devrez partager votre écran pendant vos shifts. Un appel d'équipe a lieu chaque semaine (obligatoire).</p>
      <p class="pwd-hint">écrit pomme à la fin pour le mot de passe</p>
      <div class="nav"><span></span><button class="btn-primary" onclick="next()">Suivant →</button></div>
    `;
    return;
  }

  if(q.type === "warning"){
    card.innerHTML = `
      <div class="warn-banner">⚠️ <div>Merci de répondre avec vos propres mots et pas avec de l'IA !<br>(Pour les questions suivantes)</div></div>
      <div class="nav">
        <button class="btn-ghost" onclick="prev()">← Retour</button>
        <button class="btn-primary" onclick="next()">Suivant →</button>
      </div>
    `;
    return;
  }

  if(q.type === "final"){
    card.innerHTML = `
      <h2>Validation</h2>
      <div class="check-list">
        <label class="check-row"><input type="checkbox" id="v1"> Mes réponses sont exactes</label>
        <label class="check-row"><input type="checkbox" id="v2"> J'ai 18 ans ou plus</label>
        <label class="check-row"><input type="checkbox" id="v3"> J'accepte d'être contacté·e</label>
      </div>
      <p class="err-msg" id="finalErr">Merci de cocher les 3 cases avant d'envoyer.</p>
      <div class="nav">
        <button class="btn-ghost" onclick="prev()">← Retour</button>
        <button class="btn-primary" onclick="submitForm()">Envoyer →</button>
      </div>
    `;
    return;
  }

  let field = "";
  if(q.type === "text"){
    field = `<input type="text" id="field" placeholder="${q.placeholder||""}" value="${answers[q.id]||""}">`;
  } else if(q.type === "textarea"){
    field = `<textarea id="field" placeholder="Ta réponse...">${answers[q.id]||""}</textarea>`;
  } else if(q.type === "choice"){
    field = `<div class="choice-group">` + q.options.map((opt,i)=>`
      <div class="choice ${answers[q.id]===opt?"selected":""}" onclick="selectChoice('${q.id}','${opt}')">
        <span class="letter">${LETTERS[i]}</span>${opt}
      </div>`).join("") + `</div>`;
  } else if(q.type === "multi"){
    const arr = answers[q.id] || [];
    field = `<div class="check-list">` + q.options.map(opt=>`
      <label class="check-row">
        <input type="checkbox" ${arr.includes(opt)?"checked":""} onchange="toggleMulti('${q.id}','${opt}')">
        ${opt}
      </label>`).join("") + `</div>`;
  } else if(q.type === "scale"){
    const val = answers[q.id];
    field = `<div class="scale-row">` + Array.from({length:11},(_,i)=>i).map(n=>`
      <button type="button" class="scale-btn ${String(n)===String(val)?"selected":""}" onclick="selectScale('${q.id}', ${n})">${n}</button>
    `).join("") + `</div>`;
  } else if(q.type === "file"){
    field = `
      <p class="sub">${q.note} — <a class="task-link" href="${q.linkHref}" target="_blank">${q.linkText}</a></p>
      <div class="file-drop" onclick="document.getElementById('fileInput_${q.id}').click()">
        📎 Click to choose a file or drag here
        <div class="fname" id="fname_${q.id}">${files[q.id] ? "✓ " + files[q.id].name : ""}</div>
      </div>
      <input type="file" id="fileInput_${q.id}" accept="image/*" style="display:none" onchange="handleFileSelect('${q.id}', this)">
    `;
  }

  card.innerHTML = `
    <p class="eyebrow">Question ${current}${q.optional?" · facultatif":""}</p>
    <h2>${q.label}</h2>
    ${field}
    ${q.hint?`<p class="hint">${q.hint}</p>`:""}
    <p class="err-msg" id="errMsg">Cette question est obligatoire.</p>
    <div class="nav">
      <button class="btn-ghost" onclick="prev()">← Retour</button>
      <button class="btn-primary" onclick="next()">Suivant →</button>
    </div>
  `;
}

function selectChoice(id, val){ answers[id] = val; render(); }
function toggleMulti(id, opt){
  if(!answers[id]) answers[id] = [];
  const i = answers[id].indexOf(opt);
  if(i>-1) answers[id].splice(i,1); else answers[id].push(opt);
  render();
}
function selectScale(id, val){ answers[id] = String(val); render(); }
function handleFileSelect(id, input){
  if(input.files && input.files[0]){
    files[id] = input.files[0];
    answers[id] = input.files[0].name;
  }
  render();
}
function saveField(){
  const q = questions[current];
  if(q.type === "text" || q.type === "textarea"){
    const el = document.getElementById("field");
    if(el) answers[q.id] = el.value.trim();
  }
}
function isAnswered(q){
  const val = answers[q.id];
  if(Array.isArray(val)) return val.length > 0;
  return val !== undefined && val !== "";
}
function next(){
  saveField();
  const q = questions[current];
  if(q.required && !isAnswered(q)){
    const errEl = document.getElementById("errMsg");
    if(errEl) errEl.style.display = "block";
    const fieldEl = document.getElementById("field");
    if(fieldEl) fieldEl.classList.add("error");
    return;
  }
  if(current < questions.length-1) current++;
  render();
}
function prev(){ saveField(); if(current > 0) current--; render(); }

function submitForm(){
  const v1=document.getElementById("v1").checked, v2=document.getElementById("v2").checked, v3=document.getElementById("v3").checked;
  if(!v1||!v2||!v3){ document.getElementById("finalErr").style.display = "block"; return; }

  const pwdOk = (answers["q31"]||"").trim().toLowerCase() === PASSWORD_ANSWER;

  const formData = new FormData();
  questions.forEach(q=>{
    if(q.label && answers[q.id] !== undefined && answers[q.id] !== "" && !(Array.isArray(answers[q.id]) && answers[q.id].length===0)){
      const val = Array.isArray(answers[q.id]) ? answers[q.id].join(", ") : answers[q.id];
      formData.append(q.label, val);
    }
  });
  formData.append("A bien lu le brief (mot de passe correct)", pwdOk ? "Oui ✅" : "Non ❌");
  Object.keys(files).forEach(id=>{
    formData.append(id + "_fichier", files[id]);
  });

  document.getElementById("card").innerHTML = `
    <div class="final">
      <div class="badge">✓</div>
      <h2>Candidature envoyée</h2>
      <p>Merci ! Ta candidature a bien été reçue, on te recontactera si ton profil correspond.</p>
    </div>
  `;

  fetch(FORM_ENDPOINT, {
    method: "POST",
    headers: { "Accept": "application/json" },
    body: formData
  }).catch(()=>{ /* silencieux pour le candidat, mais tu peux vérifier ton dashboard Formspree si besoin */ });

  if(TELEGRAM_BOT_TOKEN && TELEGRAM_CHAT_ID){
    let msg = `🆕 Nouvelle candidature Chatteur\n\n`;
    msg += `Mot de passe lu : ${pwdOk ? "✅ Oui" : "❌ Non"}\n\n`;
    questions.forEach(q=>{
      if(q.label && answers[q.id] !== undefined && answers[q.id] !== "" && !(Array.isArray(answers[q.id]) && answers[q.id].length===0)){
        const val = Array.isArray(answers[q.id]) ? answers[q.id].join(", ") : answers[q.id];
        msg += `• ${q.label}: ${val}\n`;
      }
    });
    if(msg.length > 3900) msg = msg.slice(0, 3900) + "\n… (tronqué, voir email pour le détail complet)";
    fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg })
    }).catch(()=>{ /* silencieux pour le candidat */ });
  }
}

render();
</script>
</body>
</html>
